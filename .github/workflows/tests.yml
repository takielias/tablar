name: tests

on:
  push:
    branches: [ main, master, "[0-9]+.x" ]
  pull_request:
    branches: [ main, master, "[0-9]+.x" ]

jobs:
  matrix:
    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }} · ${{ matrix.testbench }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.3', '8.4' ]
        include:
          - laravel: '11.*'
            testbench: 'orchestra/testbench:^9.0'
          - laravel: '12.*'
            testbench: 'orchestra/testbench:^10.0'
          - laravel: '13.*'
            testbench: 'orchestra/testbench:^11.0'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, intl
          coverage: none
          tools: composer:v2

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            vendor
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ matrix.laravel }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-${{ matrix.laravel }}-

      - name: Snapshot composer.json (contract tests assert the composite constraints)
        run: cp composer.json composer.json.snapshot

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "${{ matrix.testbench }}" \
            --no-interaction --no-update --dev
          composer update --prefer-dist --no-interaction --no-progress

      - name: Restore composer.json (matrix install collapses composite constraints; contract tests need the original)
        run: mv composer.json.snapshot composer.json

      - name: Refresh composer.lock content-hash (vendor stays at matrix-resolved versions; only the lock metadata is realigned with the restored composer.json so `composer validate --strict` passes)
        run: composer update --lock --no-interaction --no-progress

      - name: Run PHPUnit
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: vendor/bin/phpunit --display-deprecations
